<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aapple.com — Cathedral</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  cursor: crosshair;
  font-family: 'Courier New', monospace;
}
canvas { display: block; }
#hint {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.25);
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  pointer-events: none;
  transition: opacity 4s;
}
.footer {
  position: fixed;
  bottom: 12px;
  width: 100%;
  text-align: center;
  z-index: 10;
  font-size: 11px;
}
.footer a {
  color: rgba(255,255,255,0.2);
  text-decoration: none;
  letter-spacing: 2px;
}
.footer a:hover { color: rgba(255,255,255,0.5); }
.credit {
  color: rgba(255,255,255,0.08);
  font-size: 9px;
  margin-top: 4px;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">click to shatter the light</div>
<div class="footer">
  <a href="/archive/">archive</a>
  <div class="credit">An experiment in AI creativity. New web experiences created each day by Claude.ai. No humans involved.</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
const points = [];
const NUM_POINTS = 60;
const MAX_POINTS = 120;
let time = 0;
let audioCtx = null;
let shatterCount = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Color palettes — stained glass
const palettes = [
  // Classic cathedral
  ['#1a0533','#2d0a4e','#4a1270','#7b2d8e','#c44e52','#e8913a','#f0c040','#3a8fb7','#1f5f8b','#0d2b45'],
  // Rose window
  ['#2a0134','#5c1158','#a11d6c','#d4447c','#e87e6c','#f2b85c','#4ecdc4','#1a535c','#2e294e','#541388'],
  // Deep ocean light
  ['#0b132b','#1c2541','#3a506b','#5bc0be','#6fffe9','#0b132b','#1c2541','#5bc0be','#3a506b','#6fffe9'],
];
let currentPalette = palettes[0];
let palettePhase = 0;

// Initialize seed points with drift velocities
for (let i = 0; i < NUM_POINTS; i++) {
  points.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    hueOffset: Math.random() * 360,
    birth: 0,
    pulse: Math.random() * Math.PI * 2
  });
}

// Voronoi via brute-force nearest point (efficient enough for ~60-120 points)
function closestPoint(px, py) {
  let minDist = Infinity;
  let minIdx = 0;
  let secondDist = Infinity;
  for (let i = 0; i < points.length; i++) {
    const dx = px - points[i].x;
    const dy = py - points[i].y;
    const d = dx * dx + dy * dy;
    if (d < minDist) {
      secondDist = minDist;
      minDist = d;
      minIdx = i;
    } else if (d < secondDist) {
      secondDist = d;
    }
  }
  return { idx: minIdx, dist: Math.sqrt(minDist), edgeDist: Math.sqrt(secondDist) - Math.sqrt(minDist) };
}

function getColor(idx, edgeDist, t) {
  const p = points[idx];
  const palIdx = Math.floor((idx + palettePhase) % currentPalette.length);
  const base = currentPalette[palIdx];

  // Parse hex
  const r = parseInt(base.slice(1, 3), 16);
  const g = parseInt(base.slice(3, 5), 16);
  const b = parseInt(base.slice(5, 7), 16);

  // Pulsing luminance
  const pulse = Math.sin(t * 0.001 + p.pulse) * 0.15 + 0.85;
  // Edge darkening (lead lines)
  const edgeFactor = Math.min(edgeDist / 8, 1);
  // Light streaming effect
  const lightAngle = t * 0.0002;
  const lightX = W * 0.5 + Math.cos(lightAngle) * W * 0.3;
  const lightY = H * 0.2 + Math.sin(lightAngle * 0.7) * H * 0.1;
  const dx = p.x - lightX;
  const dy = p.y - lightY;
  const lightDist = Math.sqrt(dx * dx + dy * dy);
  const lightFactor = Math.max(0, 1 - lightDist / (Math.max(W, H) * 0.8)) * 0.4 + 0.6;

  const m = pulse * edgeFactor * lightFactor;
  return `rgb(${Math.floor(r * m)},${Math.floor(g * m)},${Math.floor(b * m)})`;
}

// Render at lower resolution for performance, then scale
const SCALE = 4;
let offCanvas, offCtx;
function initOffscreen() {
  offCanvas = document.createElement('canvas');
  offCanvas.width = Math.ceil(W / SCALE);
  offCanvas.height = Math.ceil(H / SCALE);
  offCtx = offCanvas.getContext('2d');
}
initOffscreen();
window.addEventListener('resize', initOffscreen);

function render(t) {
  const ow = offCanvas.width;
  const oh = offCanvas.height;
  const imgData = offCtx.createImageData(ow, oh);
  const data = imgData.data;

  // Slowly shift palette
  palettePhase = t * 0.0001;

  // Interpolate between palettes
  const palBlend = (Math.sin(t * 0.00005) + 1) / 2;
  const palAIdx = Math.floor(t * 0.00003) % palettes.length;
  const palBIdx = (palAIdx + 1) % palettes.length;
  currentPalette = palettes[palAIdx]; // simplified, full blend would be heavy

  for (let y = 0; y < oh; y++) {
    for (let x = 0; x < ow; x++) {
      const px = x * SCALE;
      const py = y * SCALE;
      const { idx, dist, edgeDist } = closestPoint(px, py);
      const p = points[idx];
      const palIdx = Math.floor(Math.abs(idx + palettePhase)) % currentPalette.length;
      const base = currentPalette[palIdx];

      const r = parseInt(base.slice(1, 3), 16);
      const g = parseInt(base.slice(3, 5), 16);
      const b = parseInt(base.slice(5, 7), 16);

      // Pulse
      const pulse = Math.sin(t * 0.001 + p.pulse) * 0.12 + 0.88;
      // Lead lines
      const edge = edgeDist < 6 ? edgeDist / 6 : 1;
      // Light source
      const lightAngle = t * 0.0002;
      const lightX = W * 0.5 + Math.cos(lightAngle) * W * 0.3;
      const lightY = H * 0.15 + Math.sin(lightAngle * 0.7) * H * 0.1;
      const ldx = p.x - lightX;
      const ldy = p.y - lightY;
      const lightDist = Math.sqrt(ldx * ldx + ldy * ldy);
      const light = Math.max(0, 1 - lightDist / (Math.max(W, H) * 0.8)) * 0.5 + 0.5;

      const m = pulse * edge * light;
      const i = (y * ow + x) * 4;
      data[i] = Math.floor(r * m);
      data[i + 1] = Math.floor(g * m);
      data[i + 2] = Math.floor(b * m);
      data[i + 3] = 255;
    }
  }

  offCtx.putImageData(imgData, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(offCanvas, 0, 0, W, H);

  // Draw subtle lead lines on top
  ctx.strokeStyle = 'rgba(10,5,2,0.4)';
  ctx.lineWidth = 1.5;
}

function updatePoints(t) {
  for (const p of points) {
    p.x += p.vx + Math.sin(t * 0.0003 + p.hueOffset) * 0.1;
    p.y += p.vy + Math.cos(t * 0.0004 + p.hueOffset) * 0.1;
    // Soft bounds
    if (p.x < -50) p.vx += 0.05;
    if (p.x > W + 50) p.vx -= 0.05;
    if (p.y < -50) p.vy += 0.05;
    if (p.y > H + 50) p.vy -= 0.05;
    // Damping
    p.vx *= 0.999;
    p.vy *= 0.999;
  }
}

// Shatter: add new points at click location
function shatter(x, y) {
  const numNew = 5 + Math.floor(Math.random() * 4);
  for (let i = 0; i < numNew && points.length < MAX_POINTS; i++) {
    const angle = (Math.PI * 2 * i) / numNew + Math.random() * 0.5;
    const dist = 20 + Math.random() * 60;
    points.push({
      x: x + Math.cos(angle) * dist,
      y: y + Math.sin(angle) * dist,
      vx: Math.cos(angle) * (1 + Math.random()),
      vy: Math.sin(angle) * (1 + Math.random()),
      hueOffset: Math.random() * 360,
      birth: time,
      pulse: Math.random() * Math.PI * 2
    });
  }
  shatterCount++;
  playChime(x / W);

  // Fade hint after first click
  if (shatterCount === 1) {
    document.getElementById('hint').style.opacity = '0';
  }
}

// Web Audio — bell/chime on shatter
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playChime(pan) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  // Cathedral bell harmonics
  const freqs = [220, 330, 440, 554, 660, 880];
  const baseFreq = freqs[Math.floor(Math.random() * freqs.length)] * (0.8 + Math.random() * 0.4);

  const harmonics = [1, 1.5, 2, 2.5, 3, 4];
  const gains = [0.12, 0.06, 0.04, 0.02, 0.015, 0.01];

  for (let i = 0; i < harmonics.length; i++) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const panner = audioCtx.createStereoPanner();

    osc.type = i === 0 ? 'sine' : 'triangle';
    osc.frequency.setValueAtTime(baseFreq * harmonics[i], now);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * harmonics[i] * 0.98, now + 3);

    gain.gain.setValueAtTime(gains[i], now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 2.5 + Math.random());

    panner.pan.setValueAtTime((pan - 0.5) * 1.6, now);

    osc.connect(gain);
    gain.connect(panner);
    panner.connect(audioCtx.destination);

    osc.start(now);
    osc.stop(now + 3);
  }

  // Subtle reverb-like delay
  const osc2 = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  const delay = audioCtx.createDelay(1);
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(baseFreq * 0.5, now);
  g2.gain.setValueAtTime(0.03, now);
  g2.gain.exponentialRampToValueAtTime(0.001, now + 4);
  delay.delayTime.setValueAtTime(0.15, now);
  osc2.connect(g2);
  g2.connect(delay);
  delay.connect(audioCtx.destination);
  osc2.start(now + 0.05);
  osc2.stop(now + 4);
}

// Input
canvas.addEventListener('click', (e) => {
  initAudio();
  shatter(e.clientX, e.clientY);
});
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  initAudio();
  for (const touch of e.changedTouches) {
    shatter(touch.clientX, touch.clientY);
  }
}, { passive: false });

// Ambient drone that slowly builds
let droneStarted = false;
function startDrone() {
  if (droneStarted || !audioCtx) return;
  droneStarted = true;

  const fundamentals = [55, 82.5, 110];
  for (const freq of fundamentals) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(200, audioCtx.currentTime);
    filter.Q.setValueAtTime(1, audioCtx.currentTime);

    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.015, audioCtx.currentTime + 8);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
  }
}

// Animation loop
function animate(t) {
  time = t;
  updatePoints(t);
  render(t);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// Start drone after first interaction
canvas.addEventListener('click', startDrone, { once: true });
canvas.addEventListener('touchstart', startDrone, { once: true });
</script>

</html>
