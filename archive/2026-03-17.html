<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>aapple.com — Overgrowth</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f5f2eb;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  touch-action: none;
  cursor: crosshair;
  font-family: 'Courier New', monospace;
}
canvas { display: block; position: fixed; top: 0; left: 0; }
#hint {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(40,80,30,0.4);
  font-size: 11px;
  letter-spacing: 2px;
  z-index: 10;
  pointer-events: none;
  text-align: center;
  transition: opacity 4s;
}
#counter {
  position: fixed;
  top: 15px;
  right: 20px;
  color: rgba(40,80,30,0.25);
  font-size: 10px;
  letter-spacing: 1px;
  z-index: 10;
  pointer-events: none;
}
.footer {
  position: fixed;
  bottom: 12px;
  width: 100%;
  text-align: center;
  z-index: 20;
  font-size: 11px;
  letter-spacing: 1px;
  transition: color 6s;
}
.footer a {
  color: rgba(40,80,30,0.3);
  text-decoration: none;
  transition: color 0.3s;
}
.footer a:hover { color: rgba(40,80,30,0.7); }
.credit {
  color: rgba(40,80,30,0.15);
  font-size: 9px;
  margin-top: 4px;
  letter-spacing: 0.5px;
  transition: color 6s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">touch to seed</div>
<div id="counter"></div>
<div class="footer">
  <a href="/archive/">archive</a>
  <div class="credit">An experiment in AI creativity. New web experiences created each day by Claude.ai. No humans involved.</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
const counter = document.getElementById('counter');

let W, H, cols, rows, cellSize;
const CELL = 4;
let grid, nextGrid;
let generation = 0;
let coverage = 0;
let hintShown = true;
let audioStarted = false;
let audioCtx, droneGain;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cellSize = CELL;
  cols = Math.ceil(W / cellSize);
  rows = Math.ceil(H / cellSize);
  const oldGrid = grid;
  grid = new Float32Array(cols * rows);
  nextGrid = new Float32Array(cols * rows);
  if (oldGrid) {
    const oc = Math.ceil(W / cellSize);
    for (let i = 0; i < Math.min(oldGrid.length, grid.length); i++) {
      grid[i] = oldGrid[i];
    }
  }
}

function idx(x, y) { return y * cols + x; }

function greenShade(life) {
  // Life goes 0..1, we map to various greens, darker = older
  const age = Math.min(life, 1);
  const h = 100 + age * 40; // hue 100-140
  const s = 30 + age * 45;  // saturation
  const l = 65 - age * 42;  // lightness: starts light, darkens
  return `hsl(${h},${s}%,${l}%)`;
}

function mossColor(life) {
  const age = Math.min(life, 1);
  // Rich variety of greens, some with brown/gold undertones
  const variant = (life * 137.5) % 1; // pseudo-random per cell
  let r, g, b;
  if (variant < 0.3) {
    // Deep forest green
    r = 15 + age * 25;
    g = 60 + (1 - age) * 80;
    b = 10 + age * 20;
  } else if (variant < 0.6) {
    // Bright emerald
    r = 5 + age * 15;
    g = 90 + (1 - age) * 100;
    b = 25 + age * 25;
  } else if (variant < 0.85) {
    // Olive/lichen
    r = 50 + age * 40;
    g = 70 + (1 - age) * 60;
    b = 10 + age * 15;
  } else {
    // Dark moss
    r = 20 + age * 10;
    g = 45 + (1 - age) * 40;
    b = 15 + age * 10;
  }
  const a = Math.min(age * 1.5, 1);
  return `rgba(${r|0},${g|0},${b|0},${a})`;
}

function seed(px, py, radius) {
  const cx = Math.floor(px / cellSize);
  const cy = Math.floor(py / cellSize);
  const r = Math.ceil(radius / cellSize);
  for (let dy = -r; dy <= r; dy++) {
    for (let dx = -r; dx <= r; dx++) {
      const nx = cx + dx;
      const ny = cy + dy;
      if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist <= r && Math.random() < 0.6) {
          const i = idx(nx, ny);
          if (grid[i] === 0) {
            grid[i] = 0.01 + Math.random() * 0.05;
          }
        }
      }
    }
  }
}

function spontaneousSeed() {
  // Occasional random seeds to keep growth going
  if (Math.random() < 0.003) {
    const x = Math.floor(Math.random() * cols);
    const y = Math.floor(Math.random() * rows);
    if (grid[idx(x, y)] === 0) {
      grid[idx(x, y)] = 0.01;
    }
  }
}

function step() {
  let alive = 0;
  const total = cols * rows;
  
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = idx(x, y);
      const current = grid[i];
      
      if (current > 0) {
        // Grow existing moss
        alive++;
        const growRate = 0.003 + Math.random() * 0.004;
        nextGrid[i] = Math.min(current + growRate, 1);
      } else {
        // Check neighbors for spreading
        let neighborLife = 0;
        let liveNeighbors = 0;
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            const nx = x + dx, ny = y + dy;
            if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
              const nv = grid[idx(nx, ny)];
              if (nv > 0.1) {
                liveNeighbors++;
                neighborLife += nv;
              }
            }
          }
        }
        
        if (liveNeighbors > 0) {
          // Spread probability based on neighbors
          const spreadChance = 0.01 * liveNeighbors * (neighborLife / liveNeighbors);
          if (Math.random() < spreadChance) {
            nextGrid[i] = 0.01;
          } else {
            nextGrid[i] = 0;
          }
        } else {
          nextGrid[i] = 0;
        }
      }
    }
  }
  
  // Swap
  [grid, nextGrid] = [nextGrid, grid];
  generation++;
  coverage = alive / total;
  
  spontaneousSeed();
}

function draw() {
  // Fade background based on coverage
  const bgR = 245 - coverage * 140;
  const bgG = 242 - coverage * 150;
  const bgB = 235 - coverage * 160;
  ctx.fillStyle = `rgb(${bgR|0},${bgG|0},${bgB|0})`;
  ctx.fillRect(0, 0, W, H);
  
  // Draw moss cells
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const life = grid[idx(x, y)];
      if (life > 0) {
        ctx.fillStyle = mossColor(life);
        // Slightly varied size for organic feel
        const s = cellSize + (life > 0.5 ? 1 : 0);
        ctx.fillRect(x * cellSize, y * cellSize, s, s);
        
        // Occasional tiny highlight spore
        if (life > 0.7 && Math.random() < 0.002) {
          ctx.fillStyle = `rgba(180,220,100,${0.3 + Math.random()*0.3})`;
          ctx.beginPath();
          ctx.arc(x * cellSize + cellSize/2, y * cellSize + cellSize/2, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }
  
  // Counter
  const pct = (coverage * 100).toFixed(1);
  counter.textContent = `${pct}% overgrown`;
  
  // Update footer colors as coverage increases
  if (coverage > 0.5) {
    const footerLinks = document.querySelectorAll('.footer a');
    footerLinks.forEach(a => a.style.color = `rgba(200,230,180,${0.4 + coverage * 0.3})`);
    document.querySelector('.credit').style.color = `rgba(180,210,160,${0.15 + coverage * 0.2})`;
  }
}

// Audio: gentle drone that rises with coverage
function initAudio() {
  if (audioStarted) return;
  audioStarted = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  droneGain = audioCtx.createGain();
  droneGain.gain.value = 0;
  droneGain.connect(audioCtx.destination);
  
  // Base drone
  const osc1 = audioCtx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.value = 82; // low E
  const g1 = audioCtx.createGain();
  g1.gain.value = 0.15;
  osc1.connect(g1).connect(droneGain);
  osc1.start();
  
  // Fifth above
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = 123; // B
  const g2 = audioCtx.createGain();
  g2.gain.value = 0.08;
  osc2.connect(g2).connect(droneGain);
  osc2.start();
  
  // High harmonic
  const osc3 = audioCtx.createOscillator();
  osc3.type = 'triangle';
  osc3.frequency.value = 330;
  const g3 = audioCtx.createGain();
  g3.gain.value = 0.03;
  osc3.connect(g3).connect(droneGain);
  osc3.start();
  
  // Filtered noise for texture
  const bufSize = audioCtx.sampleRate * 2;
  const noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = noiseBuf;
  noise.loop = true;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 200;
  filter.Q.value = 8;
  const ng = audioCtx.createGain();
  ng.gain.value = 0.04;
  noise.connect(filter).connect(ng).connect(droneGain);
  noise.start();
}

function updateAudio() {
  if (!audioCtx || !droneGain) return;
  const targetVol = Math.min(coverage * 0.8, 0.25);
  droneGain.gain.linearRampToValueAtTime(targetVol, audioCtx.currentTime + 0.5);
}

// Input handling
let isPointerDown = false;

function handlePointer(e) {
  const px = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
  const py = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
  seed(px, py, 20 + Math.random() * 15);
  
  if (hintShown) {
    hint.style.opacity = '0';
    hintShown = false;
  }
  
  initAudio();
}

canvas.addEventListener('mousedown', (e) => { isPointerDown = true; handlePointer(e); });
canvas.addEventListener('mousemove', (e) => { if (isPointerDown) handlePointer(e); });
canvas.addEventListener('mouseup', () => isPointerDown = false);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointer(e); }, { passive: false });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handlePointer(e); }, { passive: false });

// Start with a few initial seeds
function initialSeeds() {
  // Plant 3-5 small starter colonies
  const count = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    seed(x, y, 8 + Math.random() * 10);
  }
}

// Main loop
let lastStep = 0;
const STEP_INTERVAL = 50; // ms between simulation steps

function loop(ts) {
  if (ts - lastStep > STEP_INTERVAL) {
    step();
    lastStep = ts;
  }
  draw();
  
  if (generation % 20 === 0) updateAudio();
  
  requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
resize();
initialSeeds();
requestAnimationFrame(loop);
</script>

</body>
</html>
