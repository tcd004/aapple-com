<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aapple.com — The Museum of Forgotten Pixels</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  overflow: hidden;
  cursor: none;
  font-family: 'Courier New', monospace;
}
canvas { display: block; }
#hint {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(255,255,255,0.3);
  font-size: 13px;
  letter-spacing: 2px;
  pointer-events: none;
  transition: opacity 2s;
  text-align: center;
  line-height: 1.8;
}
#counter {
  position: fixed;
  top: 20px;
  right: 20px;
  color: rgba(255,255,255,0.15);
  font-size: 11px;
  letter-spacing: 1px;
  pointer-events: none;
}
.footer {
  position: fixed;
  bottom: 15px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 10;
}
.footer a {
  color: rgba(255,255,255,0.15);
  text-decoration: none;
  font-size: 11px;
  letter-spacing: 1px;
  font-family: 'Courier New', monospace;
}
.footer a:hover { color: rgba(255,255,255,0.4); }
.credit {
  color: rgba(255,255,255,0.08);
  font-size: 9px;
  margin-top: 4px;
  font-family: 'Courier New', monospace;
}
</style>
</head>
<body>
<div id="hint">move to explore<br><span style="font-size:10px;opacity:0.5">— find all the forgotten things —</span></div>
<div id="counter"></div>
<canvas id="c"></canvas>
<div class="footer">
  <a href="/archive/">archive</a>
  <div class="credit">An experiment in AI creativity. New web experiences created each day by Claude.ai. No humans involved.</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
const counter = document.getElementById('counter');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let mx = -200, my = -200;
let moved = false;
const LIGHT_RADIUS = 90;
const GLOW_RADIUS = 140;

// Pixel art scenes — each is a small grid of colors
const SCENES = [
  { name: 'sunset', pixels: [
    '..rrr..','.rryyr.','rryyyRr','ooooooO','bbbbbbb','BBBBBBb','ddddddd'
  ]},
  { name: 'tree', pixels: [
    '..ggg..','..gGg..','.gGGGg.','.gGgGg.','...b...','...b...','..bbb..'
  ]},
  { name: 'cat', pixels: [
    '.w...w.','ww.ww..','.wwww..','.wOwOw.','.wwww..','.w..w..','........'
  ]},
  { name: 'heart', pixels: [
    '.rr.rr.','rrRrRrr','rRRRRRr','rRRRRRr','.rRRRr.','..rRr..','...r...'
  ]},
  { name: 'moon', pixels: [
    '..yyy..','..yyYy.','.yyY...','.yY....','..yY...','.yyYy..','..yyy..'
  ]},
  { name: 'wave', pixels: [
    '.......','..b....','..bB..b','.bBBb.B','bBBBBbB','BBBBBBB','BBBBBBB'
  ]},
  { name: 'ghost', pixels: [
    '..www...','.wwwww.','ww0w0ww','wwwwwww','wwwwwww','wwwwwww','w.ww.w.'
  ]},
  { name: 'apple', pixels: [
    '...g...','..g....','.rrRr..','rRRRRr.','rRRRRr.','.rRRr..','..rr...'
  ]},
  { name: 'star', pixels: [
    '...y...','...Y...','..yYy..','.yYYYy.','..yYy..','..y.y..','.y...y.'
  ]},
  { name: 'skull', pixels: [
    '..www...','.wwwww.','w.ww.ww','wwwwwww','.wwwww.','.w.w.w.','..w.w..'
  ]},
  { name: 'house', pixels: [
    '...r...','..rrr..','.rrrrr.','yyyyyyy','y.yy.yy','y.yy.yy','y.yyyy.'
  ]},
  { name: 'fish', pixels: [
    '........','...bbb..','b.bBBBb.','bbBOBBb.','b.bBBBb.','...bbb..','........'
  ]},
];

const COLOR_MAP = {
  'r': '#cc3333', 'R': '#ee5555',
  'g': '#33aa33', 'G': '#55cc55',
  'b': '#3355aa', 'B': '#5577cc',
  'y': '#ccaa33', 'Y': '#eedd55',
  'o': '#cc7722', 'O': '#ee9944',
  'w': '#cccccc', 'W': '#ffffff',
  'd': '#333333', 'D': '#555555',
  '0': '#111111',
};

// Place scenes randomly
const PIXEL_SIZE = 8;
const placed = [];
const discovered = new Set();
let totalFound = 0;

function placeScenes() {
  placed.length = 0;
  const margin = 100;
  const attempts = 800;
  for (let i = 0; i < SCENES.length; i++) {
    const scene = SCENES[i];
    const sw = scene.pixels[0].length * PIXEL_SIZE;
    const sh = scene.pixels.length * PIXEL_SIZE;
    for (let a = 0; a < attempts; a++) {
      const x = margin + Math.random() * (W - 2 * margin - sw);
      const y = margin + Math.random() * (H - 2 * margin - sh);
      let ok = true;
      for (const p of placed) {
        const dx = (x + sw/2) - (p.x + p.w/2);
        const dy = (y + sh/2) - (p.y + p.h/2);
        if (Math.sqrt(dx*dx + dy*dy) < 160) { ok = false; break; }
      }
      if (ok) {
        placed.push({ x, y, w: sw, h: sh, scene, revealed: 0, found: false, sparkle: 0 });
        break;
      }
    }
  }
}
placeScenes();

// Dust particles for atmosphere
const dust = [];
for (let i = 0; i < 120; i++) {
  dust.push({
    x: Math.random() * W,
    y: Math.random() * H,
    s: 0.5 + Math.random() * 1.5,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.2,
    a: Math.random()
  });
}

function drawScene(p, lightDist) {
  const scene = p.scene;
  const intensity = Math.max(0, 1 - lightDist / GLOW_RADIUS);
  if (intensity <= 0) return;

  for (let row = 0; row < scene.pixels.length; row++) {
    for (let col = 0; col < scene.pixels[row].length; col++) {
      const ch = scene.pixels[row][col];
      if (ch === '.') continue;
      const color = COLOR_MAP[ch] || '#888';
      const px = p.x + col * PIXEL_SIZE;
      const py = p.y + row * PIXEL_SIZE;
      const pdist = Math.sqrt((px + PIXEL_SIZE/2 - mx) ** 2 + (py + PIXEL_SIZE/2 - my) ** 2);
      const pint = Math.max(0, 1 - pdist / GLOW_RADIUS);
      if (pint <= 0) continue;
      ctx.globalAlpha = pint * 0.9;
      ctx.fillStyle = color;
      ctx.fillRect(px, py, PIXEL_SIZE, PIXEL_SIZE);
      // pixel grid lines
      ctx.globalAlpha = pint * 0.15;
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(px, py, PIXEL_SIZE, PIXEL_SIZE);
    }
  }

  // Check if discovered
  if (!p.found && intensity > 0.6) {
    p.revealed += 0.02;
    if (p.revealed > 1) {
      p.found = true;
      p.sparkle = 1;
      totalFound++;
      discovered.add(p.scene.name);
      updateCounter();
    }
  }

  // Sparkle on discovery
  if (p.sparkle > 0) {
    p.sparkle -= 0.01;
    const cx = p.x + p.w / 2;
    const cy = p.y + p.h / 2;
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2 + performance.now() * 0.002;
      const r = 30 + (1 - p.sparkle) * 40;
      const sx = cx + Math.cos(angle) * r;
      const sy = cy + Math.sin(angle) * r;
      ctx.globalAlpha = p.sparkle * 0.6;
      ctx.fillStyle = '#fff';
      ctx.fillRect(sx - 1, sy - 1, 2, 2);
    }
  }

  // Show name after found
  if (p.found) {
    ctx.globalAlpha = intensity * 0.35;
    ctx.fillStyle = '#aaa';
    ctx.font = '9px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(p.scene.name, p.x + p.w / 2, p.y + p.h + 14);
  }
}

function updateCounter() {
  if (totalFound === 0) {
    counter.textContent = '';
  } else if (totalFound === placed.length) {
    counter.textContent = `all ${totalFound} found ✦`;
  } else {
    counter.textContent = `${totalFound} / ${placed.length}`;
  }
}

// Flashlight cursor
function drawFlashlight() {
  // Radial gradient for light
  const grad = ctx.createRadialGradient(mx, my, 0, mx, my, GLOW_RADIUS);
  grad.addColorStop(0, 'rgba(255, 245, 220, 0.07)');
  grad.addColorStop(0.5, 'rgba(255, 240, 200, 0.03)');
  grad.addColorStop(1, 'rgba(255, 240, 200, 0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Small bright center dot
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = '#ffe8c0';
  ctx.beginPath();
  ctx.arc(mx, my, 2, 0, Math.PI * 2);
  ctx.fill();
}

function drawDust() {
  const t = performance.now() * 0.001;
  for (const d of dust) {
    d.x += d.vx;
    d.y += d.vy;
    if (d.x < 0) d.x = W;
    if (d.x > W) d.x = 0;
    if (d.y < 0) d.y = H;
    if (d.y > H) d.y = 0;

    const dist = Math.sqrt((d.x - mx) ** 2 + (d.y - my) ** 2);
    if (dist < GLOW_RADIUS) {
      const intensity = 1 - dist / GLOW_RADIUS;
      ctx.globalAlpha = intensity * 0.3 * (0.5 + 0.5 * Math.sin(t + d.a * 10));
      ctx.fillStyle = '#ffe8c0';
      ctx.fillRect(d.x, d.y, d.s, d.s);
    }
  }
}

function frame() {
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Draw subtle grid pattern in light area
  ctx.globalAlpha = 0.02;
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 0.5;
  const gs = 40;
  for (let x = 0; x < W; x += gs) {
    for (let y = 0; y < H; y += gs) {
      const dist = Math.sqrt((x - mx) ** 2 + (y - my) ** 2);
      if (dist < GLOW_RADIUS) {
        ctx.globalAlpha = 0.015 * (1 - dist / GLOW_RADIUS);
        ctx.strokeRect(x, y, gs, gs);
      }
    }
  }

  // Draw scenes
  for (const p of placed) {
    const cx = p.x + p.w / 2;
    const cy = p.y + p.h / 2;
    const dist = Math.sqrt((cx - mx) ** 2 + (cy - my) ** 2);
    drawScene(p, dist);
  }

  ctx.globalAlpha = 1;
  drawDust();
  drawFlashlight();

  requestAnimationFrame(frame);
}

// Input
function onMove(x, y) {
  mx = x; my = y;
  if (!moved) {
    moved = true;
    hint.style.opacity = '0';
  }
}

window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
window.addEventListener('touchmove', e => {
  e.preventDefault();
  onMove(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
window.addEventListener('touchstart', e => {
  onMove(e.touches[0].clientX, e.touches[0].clientY);
});

frame();
</script>

</body>
</html>
