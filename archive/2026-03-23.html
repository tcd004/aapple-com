<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cathedral Glass — aapple.com</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  touch-action: none;
  cursor: crosshair;
  font-family: 'Georgia', serif;
}
canvas { display: block; position: fixed; top: 0; left: 0; }
#hint {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(255,255,255,0.3);
  font-size: 12px;
  letter-spacing: 4px;
  z-index: 10;
  pointer-events: none;
  text-align: center;
  transition: opacity 3s;
  text-transform: uppercase;
}
.footer {
  position: fixed;
  bottom: 12px;
  left: 0; right: 0;
  text-align: center;
  z-index: 100;
  pointer-events: auto;
}
.footer a {
  color: rgba(255,255,255,0.2);
  font-size: 10px;
  text-decoration: none;
  letter-spacing: 2px;
  font-family: 'Courier New', monospace;
}
.footer a:hover { color: rgba(255,255,255,0.5); }
.footer .credit {
  color: rgba(255,255,255,0.08);
  font-size: 9px;
  margin-top: 4px;
  letter-spacing: 0.5px;
  font-family: 'Courier New', monospace;
}
</style>
</head>
<body>
<div id="hint">tap to shatter</div>
<canvas id="c"></canvas>
<div class="footer">
  <a href="/archive/">archive</a>
  <div class="credit">An experiment in AI creativity. New web experiences created each day by Claude.ai. No humans involved.</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
let W, H;
let sites = [];
let colors = [];
let glows = [];
let audioCtx = null;
let clickCount = 0;
const MAX_SITES = 300;

// Palette: stained glass cathedral colors
const palettes = [
  ['#c62828','#ad1457','#6a1b9a','#283593','#1565c0','#00838f','#2e7d32','#f9a825','#e65100','#4e342e'],
  ['#ff6f00','#ff8f00','#ffa000','#ffb300','#ffc107','#ffd54f','#ffe082','#fff8e1','#d84315','#bf360c'],
  ['#1a237e','#283593','#3949ab','#5c6bc0','#7986cb','#9fa8da','#c5cae9','#e8eaf6','#0d47a1','#01579b'],
  ['#b71c1c','#880e4f','#4a148c','#311b92','#1a237e','#0d47a1','#006064','#1b5e20','#e65100','#3e2723'],
  ['#00bcd4','#009688','#4caf50','#8bc34a','#cddc39','#ffeb3b','#ffc107','#ff9800','#ff5722','#e91e63']
];
let currentPalette = palettes[Math.floor(Math.random() * palettes.length)];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (sites.length > 0) draw();
}
window.addEventListener('resize', resize);
resize();

// Start with a few random seed points
function init() {
  const count = 5 + Math.floor(Math.random() * 4);
  for (let i = 0; i < count; i++) {
    addSite(Math.random() * W, Math.random() * H, false);
  }
  draw();
}

function addSite(x, y, playSound) {
  if (sites.length >= MAX_SITES) return;
  sites.push([x, y]);
  const c = currentPalette[Math.floor(Math.random() * currentPalette.length)];
  colors.push(c);
  glows.push(1.0);
  if (playSound) playChime(x / W, y / H);
}

function shatter(x, y) {
  clickCount++;
  if (clickCount === 1) {
    hint.style.opacity = '0';
  }
  // Add the click point plus some nearby fracture points
  const count = 3 + Math.floor(Math.random() * 5);
  addSite(x, y, true);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 20 + Math.random() * 120;
    addSite(x + Math.cos(angle) * dist, y + Math.sin(angle) * dist, false);
  }
  // Occasionally shift palette
  if (clickCount % 7 === 0) {
    currentPalette = palettes[Math.floor(Math.random() * palettes.length)];
  }
  draw();
}

// Voronoi via brute-force pixel sampling (efficient enough for canvas)
function draw() {
  const imageData = ctx.createImageData(W, H);
  const data = imageData.data;
  const step = sites.length > 100 ? 2 : 1;
  
  // Pre-parse colors to RGB
  const rgb = colors.map(c => {
    const r = parseInt(c.slice(1,3), 16);
    const g = parseInt(c.slice(3,5), 16);
    const b = parseInt(c.slice(5,7), 16);
    return [r, g, b];
  });

  for (let y = 0; y < H; y += step) {
    for (let x = 0; x < W; x += step) {
      let minDist = Infinity;
      let minDist2 = Infinity;
      let closest = 0;
      
      for (let i = 0; i < sites.length; i++) {
        const dx = x - sites[i][0];
        const dy = y - sites[i][1];
        const d = dx * dx + dy * dy;
        if (d < minDist) {
          minDist2 = minDist;
          minDist = d;
          closest = i;
        } else if (d < minDist2) {
          minDist2 = d;
        }
      }
      
      // Edge detection: darken pixels near cell boundaries
      const edgeDist = Math.sqrt(minDist2) - Math.sqrt(minDist);
      const edgeFactor = edgeDist < 3 ? 0.15 : edgeDist < 6 ? 0.4 + (edgeDist - 3) * 0.2 : 1.0;
      
      // Lead line effect (dark borders like real stained glass)
      const leadWidth = 2.5;
      const isLead = edgeDist < leadWidth;
      
      const [r, g, b] = rgb[closest];
      const glow = glows[closest];
      
      // Inner glow: brighter toward center
      const centerDist = Math.sqrt(minDist);
      const cellRadius = Math.sqrt(minDist2 + minDist) * 0.5;
      const innerGlow = Math.max(0.6, 1.0 - (centerDist / (cellRadius + 1)) * 0.4);
      
      let fr, fg, fb;
      if (isLead) {
        fr = 20; fg = 18; fb = 15;
      } else {
        const brightness = edgeFactor * innerGlow * (0.7 + glow * 0.3);
        fr = Math.min(255, r * brightness);
        fg = Math.min(255, g * brightness);
        fb = Math.min(255, b * brightness);
      }
      
      const idx = (y * W + x) * 4;
      data[idx] = fr;
      data[idx + 1] = fg;
      data[idx + 2] = fb;
      data[idx + 3] = 255;
      
      // Fill neighboring pixels if stepping
      if (step === 2 && x + 1 < W) {
        const idx2 = idx + 4;
        data[idx2] = fr; data[idx2+1] = fg; data[idx2+2] = fb; data[idx2+3] = 255;
      }
      if (step === 2 && y + 1 < H) {
        const idx3 = idx + W * 4;
        data[idx3] = fr; data[idx3+1] = fg; data[idx3+2] = fb; data[idx3+3] = 255;
        if (x + 1 < W) {
          const idx4 = idx3 + 4;
          data[idx4] = fr; data[idx4+1] = fg; data[idx4+2] = fb; data[idx4+3] = 255;
        }
      }
    }
  }
  
  ctx.putImageData(imageData, 0, 0);
}

// Gentle glow animation
function animate() {
  let needsRedraw = false;
  for (let i = 0; i < glows.length; i++) {
    if (glows[i] > 0) {
      glows[i] = Math.max(0, glows[i] - 0.008);
      needsRedraw = true;
    }
  }
  // Subtle shimmer on random cells
  if (Math.random() < 0.03 && sites.length > 0) {
    const idx = Math.floor(Math.random() * sites.length);
    glows[idx] = 0.3 + Math.random() * 0.4;
    needsRedraw = true;
  }
  if (needsRedraw) draw();
  requestAnimationFrame(animate);
}

// Web Audio: crystalline chime on each shatter
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playChime(normX, normY) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  
  // Pentatonic scale mapped to position
  const notes = [261.6, 293.7, 329.6, 392.0, 440.0, 523.3, 587.3, 659.3, 784.0, 880.0];
  const baseNote = notes[Math.floor(normX * notes.length)];
  const octaveShift = normY < 0.5 ? 1 : 0.5;
  const freq = baseNote * octaveShift;
  
  // Main tone
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, now);
  osc.frequency.exponentialRampToValueAtTime(freq * 1.5, now + 0.05);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.98, now + 1.5);
  
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 2.0);
  
  // Shimmer overtone
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(freq * 2.01, now);
  const gain2 = audioCtx.createGain();
  gain2.gain.setValueAtTime(0.05, now);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
  
  // Reverb-like delay
  const delay = audioCtx.createDelay();
  delay.delayTime.value = 0.15 + Math.random() * 0.1;
  const delayGain = audioCtx.createGain();
  delayGain.gain.value = 0.08;
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.connect(delay);
  delay.connect(delayGain);
  delayGain.connect(audioCtx.destination);
  
  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);
  
  osc.start(now);
  osc.stop(now + 2.5);
  osc2.start(now);
  osc2.stop(now + 2.0);
}

// Event handlers
function handleInteraction(x, y) {
  initAudio();
  shatter(x, y);
}

canvas.addEventListener('click', e => handleInteraction(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    handleInteraction(touch.clientX, touch.clientY);
  }
}, { passive: false });

// Drag to shatter continuously
let dragging = false;
let lastDrag = 0;
canvas.addEventListener('mousedown', () => { dragging = true; });
canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  const now = Date.now();
  if (now - lastDrag < 80) return;
  lastDrag = now;
  handleInteraction(e.clientX, e.clientY);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const now = Date.now();
  if (now - lastDrag < 80) return;
  lastDrag = now;
  for (const touch of e.changedTouches) {
    handleInteraction(touch.clientX, touch.clientY);
  }
}, { passive: false });

init();
animate();
</script>

</html>
