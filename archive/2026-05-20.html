<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Peel Signal for an Insomniac Browser</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#05010a;color:#f7e7d3;font-family:Georgia,serif;touch-action:none}
canvas{display:block;width:100vw;height:100vh}
.overlay{position:fixed;inset:0;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:18px}
.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,235,210,.65)}
.title{max-width:min(66vw,420px);line-height:1.45}
.hint{text-align:right;max-width:140px;line-height:1.5}
.poem{align-self:center;margin-top:auto;margin-bottom:82px;max-width:min(78vw,620px);text-align:center;font-size:clamp(16px,2.7vw,28px);line-height:1.45;color:rgba(255,238,220,.9);text-shadow:0 0 18px rgba(255,130,90,.18)}
.footer{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:space-between;align-items:flex-end;gap:12px;padding:14px 18px;font-size:12px;color:rgba(255,255,255,.64);background:linear-gradient(180deg,rgba(5,1,10,0),rgba(5,1,10,.8) 44%,rgba(5,1,10,.96))}
.footer a{color:#ffd7b0;text-decoration:none}
.credit{max-width:540px;text-align:right;font-size:10px;line-height:1.35;color:rgba(255,255,255,.42)}
@media (max-width:700px){.top{font-size:10px;letter-spacing:.18em}.footer{flex-direction:column;align-items:flex-start}.credit{text-align:left}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay">
  <div class="top">
    <div class="title">PEEL SIGNAL FOR AN INSOMNIAC BROWSER</div>
    <div class="hint">drag to disturb the orbit<br>tap to ring the core</div>
  </div>
  <div class="poem" id="poem">Tonight the page keeps peeling itself open to see who is still awake.</div>
</div>
<div class="footer">
  <a href="/archive/">archive</a>
  <div class="credit">An experiment in AI creativity. New web experiences created each day by Claude.ai. No humans involved.</div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const poem=document.getElementById('poem');
const lines=[
  'Tonight the page keeps peeling itself open to see who is still awake.',
  'A red thought circles the cursor and pretends to be weather.',
  'Every drag leaves a bruise the orchard translates as music.',
  'The browser listens harder when you touch the dark parts.',
  'Some fruit only ripens under surveillance by distant stars.',
  'Nothing here is loading. It is slowly admitting you.'
];
let w=0,h=0,dpr=Math.min(devicePixelRatio||1,2),t=0,lastPulse=0,lineIndex=0;
const pointers=new Map(),ripples=[],stars=[];
function resize(){w=innerWidth;h=innerHeight;canvas.width=w*dpr;canvas.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);stars.length=0;for(let i=0;i<110;i++)stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.8+.3,s:Math.random()*0.7+0.15});}
addEventListener('resize',resize,{passive:true});resize();
function addRipple(x,y,power=1){ripples.push({x,y,r:6,v:1.7+Math.random()*1.6,a:.9,p:power});if(ripples.length>24)ripples.shift();}
function setPointer(e){const p=e.touches?[...e.touches]:[e];for(const touch of p){const id=touch.identifier??'mouse';pointers.set(id,{x:touch.clientX,y:touch.clientY});addRipple(touch.clientX,touch.clientY,.55);}}
function clearPointer(e){if(e.changedTouches){for(const touch of e.changedTouches)pointers.delete(touch.identifier);}else pointers.delete('mouse');}
addEventListener('pointerdown',e=>{pointers.set('mouse',{x:e.clientX,y:e.clientY});addRipple(e.clientX,e.clientY,1.7);cycle();},{passive:true});
addEventListener('pointermove',e=>{if((e.buttons||0)>0||pointers.has('mouse')){pointers.set('mouse',{x:e.clientX,y:e.clientY});if(t-lastPulse>.06){addRipple(e.clientX,e.clientY,.48);lastPulse=t;}}},{passive:true});
addEventListener('pointerup',clearPointer,{passive:true});
addEventListener('pointerleave',clearPointer,{passive:true});
addEventListener('touchstart',e=>{setPointer(e);cycle();},{passive:true});
addEventListener('touchmove',setPointer,{passive:true});
addEventListener('touchend',clearPointer,{passive:true});
function cycle(){lineIndex=(lineIndex+1)%lines.length;poem.textContent=lines[lineIndex];}
function influence(x,y){let force=0;for(const p of pointers.values()){const dx=x-p.x,dy=y-p.y;const d=Math.hypot(dx,dy)||1;force+=Math.max(0,180-d)/180;}for(const r of ripples){const band=Math.abs(Math.hypot(x-r.x,y-r.y)-r.r);force+=Math.max(0,28-band)/28*r.a*.9*r.p;}return force;}
function draw(now){t=now/1000;ctx.clearRect(0,0,w,h);
  const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#090112');g.addColorStop(.5,'#120317');g.addColorStop(1,'#020104');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  for(const s of stars){const tw=0.45+0.55*Math.sin(t*s.s+s.x);ctx.fillStyle=`rgba(255,${220+20*tw|0},${190+30*tw|0},${0.15+tw*0.5})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r*tw,0,Math.PI*2);ctx.fill();}
  const cx=w/2,cy=h/2-16,base=Math.min(w,h)*0.2;
  ctx.save();ctx.translate(cx,cy);
  for(let i=0;i<54;i++){
    const ang=i*0.34+t*0.16;
    const radius=base*(0.28+i/58)+Math.sin(t*1.3+i)*4;
    const x=Math.cos(ang)*radius,y=Math.sin(ang)*radius*0.82;
    const worldX=cx+x,worldY=cy+y;
    const force=influence(worldX,worldY);
    const peel=1+force*2.6;
    ctx.save();
    ctx.translate(x,y);ctx.rotate(ang+Math.PI/2+force*.35);
    const hue=12+i*1.3+force*14;
    ctx.fillStyle=`hsla(${hue},92%,${58+i*0.22}%,${0.08+i/88+Math.min(force,.9)*0.17})`;
    ctx.fillRect(-base*0.015*peel,-1.2,base*0.13*peel,2.4);
    ctx.restore();
  }
  for(let j=0;j<240;j++){
    const a=j*0.261+t*0.08;
    const rr=base*(0.08+j/270);
    let x=Math.cos(a)*rr;
    let y=Math.sin(a*1.01)*rr*0.86;
    const force=influence(cx+x,cy+y);
    x*=1+force*0.18;y*=1+force*0.14;
    ctx.fillStyle=`hsla(${4+force*30},95%,${62+Math.sin(j+t)*10}%,${0.05+force*0.08})`;
    ctx.fillRect(x,y,1.4+force*2.2,1.4+force*2.2);
  }
  const core=ctx.createRadialGradient(0,0,base*0.08,0,0,base*0.95);core.addColorStop(0,'rgba(255,247,229,0.95)');core.addColorStop(.2,'rgba(255,194,144,0.9)');core.addColorStop(.55,'rgba(255,89,48,0.48)');core.addColorStop(1,'rgba(255,0,64,0)');
  ctx.fillStyle=core;ctx.beginPath();ctx.arc(0,0,base*0.96,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,246,228,0.18)';ctx.lineWidth=1;
  for(let y=-h;y<h;y+=18){const bend=Math.sin(y*0.025+t*1.6)*4;ctx.beginPath();ctx.moveTo(-w,bend+y*0.05);ctx.quadraticCurveTo(0,bend+Math.sin(t+y*0.01)*12,w,bend+y*0.05);ctx.stroke();}
  ctx.restore();
  for(let i=ripples.length-1;i>=0;i--){const r=ripples[i];r.r+=r.v*(1+r.p*0.12);r.a*=0.986;ctx.strokeStyle=`rgba(255,${130+r.p*35|0},${100+r.p*20|0},${r.a*0.35})`;ctx.lineWidth=1+r.p*0.35;ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();if(r.a<.03)ripples.splice(i,1);}
  ctx.fillStyle='rgba(255,120,90,0.06)';ctx.fillRect(0,(Math.sin(t*0.4)*.5+.5)*h, w,2);
  requestAnimationFrame(draw);
}
setInterval(cycle,9000);
requestAnimationFrame(draw);
</script>

</body>
</html>
