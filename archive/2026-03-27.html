<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Garden — aapple.com</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0c; overflow: hidden; cursor: crosshair; }
canvas { display: block; }
.hint {
  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.25); font: 11px 'Courier New', monospace;
  letter-spacing: 2px; pointer-events: none; transition: opacity 2s;
  text-align: center;
}
.footer {
  position: fixed; bottom: 10px; left: 0; right: 0; text-align: center;
  font: 10px 'Courier New', monospace; z-index: 10;
}
.footer a { color: rgba(255,255,255,0.2); text-decoration: none; }
.footer a:hover { color: rgba(255,255,255,0.5); }
.footer .credit { color: rgba(255,255,255,0.08); margin-top: 4px; font-size: 9px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint" id="hint">tap anywhere to plant a seed</div>
<div class="footer">
  <a href="/archive/">archive</a>
  <div class="credit">An experiment in AI creativity. New web experiences created each day by Claude.ai. No humans involved.</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

const plants = [];
const particles = [];
const seeds = [];
let wind = 0, windTarget = 0, time = 0;
let planted = 0;

const palettes = [
  ['#ff6b9d','#c44569','#f8a5c2'],
  ['#78e08f','#38ada9','#b8e994'],
  ['#f6b93b','#e55039','#fa983a'],
  ['#82ccdd','#60a3bc','#3c6382'],
  ['#e056fd','#be2edd','#686de0'],
  ['#badc58','#6ab04c','#27ae60'],
  ['#ff9ff3','#f368e0','#ff6348'],
  ['#54a0ff','#2e86de','#48dbfb'],
];

class Segment {
  constructor(x, y, angle, len, depth, maxDepth, palette, type) {
    this.x = x; this.y = y;
    this.baseAngle = angle;
    this.angle = angle;
    this.len = len;
    this.depth = depth;
    this.maxDepth = maxDepth;
    this.palette = palette;
    this.type = type;
    this.growth = 0;
    this.children = [];
    this.blooms = [];
    this.swayOffset = Math.random() * Math.PI * 2;
    this.thickness = Math.max(1, (maxDepth - depth) * 1.2);
  }
  grow(dt) {
    if (this.growth < 1) {
      this.growth = Math.min(1, this.growth + dt * (1.5 + this.depth * 0.5));
    }
    if (this.growth > 0.8 && this.children.length === 0 && this.depth < this.maxDepth) {
      this.branch();
    }
    if (this.growth >= 1 && this.depth === this.maxDepth && this.blooms.length === 0) {
      this.bloom();
    }
    this.children.forEach(c => c.grow(dt));
  }
  branch() {
    const n = this.type === 0 ? 2 : this.type === 1 ? 3 : 2;
    const spread = this.type === 1 ? 0.8 : 0.5;
    for (let i = 0; i < n; i++) {
      const a = this.baseAngle + (i - (n-1)/2) * spread + (Math.random()-0.5)*0.3;
      const endX = this.x + Math.cos(this.angle) * this.len * this.growth;
      const endY = this.y + Math.sin(this.angle) * this.len * this.growth;
      const newLen = this.len * (0.6 + Math.random() * 0.2);
      this.children.push(new Segment(endX, endY, a, newLen, this.depth+1, this.maxDepth, this.palette, this.type));
    }
  }
  bloom() {
    const endX = this.x + Math.cos(this.angle) * this.len;
    const endY = this.y + Math.sin(this.angle) * this.len;
    if (this.type === 0) {
      for (let i = 0; i < 8; i++) {
        this.blooms.push({ x: endX, y: endY, angle: (Math.PI*2/8)*i, r: 3+Math.random()*4, phase: Math.random()*Math.PI*2 });
      }
    } else if (this.type === 1) {
      this.blooms.push({ x: endX, y: endY, r: 2+Math.random()*3, glow: true });
    } else {
      for (let i = 0; i < 5; i++) {
        this.blooms.push({ x: endX, y: endY, angle: (Math.PI*2/5)*i, r: 2+Math.random()*2, petal: true });
      }
    }
  }
  draw(ctx, t, windVal) {
    const sway = Math.sin(t * 1.5 + this.swayOffset + this.depth * 0.5) * windVal * (this.depth + 1) * 0.02;
    this.angle = this.baseAngle + sway;
    const endX = this.x + Math.cos(this.angle) * this.len * this.growth;
    const endY = this.y + Math.sin(this.angle) * this.len * this.growth;
    const col = this.palette[Math.min(this.depth, this.palette.length-1)];
    const alpha = 0.4 + this.depth * 0.15;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = col;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = this.thickness * this.growth;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.globalAlpha = 1;
    // blooms
    this.blooms.forEach(b => {
      const bx = endX, by = endY;
      const pulse = 1 + Math.sin(t * 2 + (b.phase||0)) * 0.15;
      if (b.glow) {
        ctx.beginPath();
        ctx.arc(bx, by, b.r * pulse * 2, 0, Math.PI*2);
        ctx.fillStyle = col;
        ctx.globalAlpha = 0.15;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(bx, by, b.r * pulse, 0, Math.PI*2);
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.7;
        ctx.fill();
      } else if (b.petal) {
        const pa = b.angle + sway + t * 0.3;
        const px = bx + Math.cos(pa) * b.r * 2.5;
        const py = by + Math.sin(pa) * b.r * 2.5;
        ctx.beginPath();
        ctx.ellipse(px, py, b.r * pulse, b.r * 0.5 * pulse, pa, 0, Math.PI*2);
        ctx.fillStyle = col;
        ctx.globalAlpha = 0.6;
        ctx.fill();
      } else {
        const da = b.angle + sway;
        const dx = bx + Math.cos(da) * b.r * 1.5;
        const dy = by + Math.sin(da) * b.r * 1.5;
        ctx.beginPath();
        ctx.arc(dx, dy, b.r * pulse * 0.5, 0, Math.PI*2);
        ctx.fillStyle = col;
        ctx.globalAlpha = 0.5;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      // Occasionally release a seed particle
      if (Math.random() < 0.0003 && plants.length < 40) {
        seeds.push({ x: bx, y: by, vx: (Math.random()-0.5)*0.3, vy: -0.3 - Math.random()*0.2, life: 300 + Math.random()*200, palette: this.palette });
      }
    });
    this.children.forEach(c => {
      c.x = endX; c.y = endY;
      c.draw(ctx, t, windVal);
    });
  }
}

class Plant {
  constructor(x, y, palette) {
    this.x = x; this.y = y;
    this.palette = palette || palettes[Math.floor(Math.random()*palettes.length)];
    const type = Math.floor(Math.random()*3);
    const depth = 3 + Math.floor(Math.random()*3);
    const len = 20 + Math.random()*30;
    this.root = new Segment(x, y, -Math.PI/2 + (Math.random()-0.5)*0.3, len, 0, depth, this.palette, type);
    // ground glow
    this.glowR = 10 + Math.random()*20;
  }
  update(dt) { this.root.grow(dt); }
  draw(ctx, t, w) {
    // ground glow
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.glowR);
    g.addColorStop(0, this.palette[0] + '22');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(this.x - this.glowR, this.y - this.glowR, this.glowR*2, this.glowR*2);
    this.root.draw(ctx, t, w);
  }
}

function plantSeed(x, y, pal) {
  if (plants.length >= 50) return;
  plants.push(new Plant(x, y, pal));
  // sparkle burst
  for (let i = 0; i < 12; i++) {
    const a = Math.PI*2/12*i;
    particles.push({ x, y, vx: Math.cos(a)*2, vy: Math.sin(a)*2, life: 30+Math.random()*20, maxLife: 50, r: 1+Math.random() });
  }
  planted++;
  if (planted === 1) {
    setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 1000);
  }
}

canvas.addEventListener('click', e => plantSeed(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) plantSeed(t.clientX, t.clientY);
}, { passive: false });

// auto-plant a few to start
setTimeout(() => {
  for (let i = 0; i < 3; i++) {
    plantSeed(W * (0.2 + Math.random()*0.6), H * (0.5 + Math.random()*0.3));
  }
}, 500);

let last = performance.now();
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  time += dt;

  // wind
  if (Math.random() < 0.005) windTarget = (Math.random()-0.5) * 2;
  wind += (windTarget - wind) * 0.01;

  // fade trail
  ctx.fillStyle = 'rgba(10,10,12,0.08)';
  ctx.fillRect(0, 0, W, H);

  // subtle ground line
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;

  // seeds drifting
  for (let i = seeds.length - 1; i >= 0; i--) {
    const s = seeds[i];
    s.vx += wind * 0.005;
    s.vy += 0.01; // gentle gravity
    s.x += s.vx;
    s.y += s.vy;
    s.life--;
    const alpha = Math.min(1, s.life / 50);
    ctx.beginPath();
    ctx.arc(s.x, s.y, 1.5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.6})`;
    ctx.fill();
    // tiny trail
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - s.vx*3, s.y - s.vy*3);
    ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.2})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    if (s.life <= 0 || s.y > H || s.x < 0 || s.x > W) {
      // plant where it lands if on screen
      if (s.y < H && s.y > H * 0.3 && s.x > 0 && s.x < W && plants.length < 40) {
        plantSeed(s.x, s.y, s.palette);
      }
      seeds.splice(i, 1);
    }
  }

  // sparkle particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.life--;
    const alpha = p.life / p.maxLife;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.8})`;
    ctx.fill();
    if (p.life <= 0) particles.splice(i, 1);
  }

  // plants
  plants.forEach(p => {
    p.update(dt);
    p.draw(ctx, time, wind);
  });

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>

</body>
</html>
