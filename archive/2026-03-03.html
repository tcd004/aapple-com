<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3:00 AM</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #020204;
  color: #1a1a2e;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  cursor: none;
  user-select: none;
}
#clock {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: clamp(48px, 12vw, 120px);
  font-weight: bold;
  color: #0f0f1a;
  transition: color 3s;
  z-index: 2;
  letter-spacing: 8px;
}
#clock.visible { color: #2a2a4a; }
#clock.glitch {
  animation: clockGlitch 0.15s steps(2) 3;
  color: #4a1a1a;
}
@keyframes clockGlitch {
  0% { transform: translate(-50%, -50%) skewX(-5deg); opacity: 0.8; }
  50% { transform: translate(-48%, -52%) skewX(3deg); opacity: 0.5; }
  100% { transform: translate(-50%, -50%) skewX(0); opacity: 1; }
}
#whisper {
  position: absolute;
  font-size: clamp(11px, 2vw, 16px);
  color: rgba(100, 80, 80, 0);
  transition: color 4s, opacity 4s;
  z-index: 3;
  pointer-events: none;
  max-width: 80vw;
  text-align: center;
}
#cursor {
  position: absolute;
  width: 6px;
  height: 6px;
  background: radial-gradient(circle, rgba(80,60,60,0.4), transparent);
  border-radius: 50%;
  pointer-events: none;
  z-index: 10;
  transition: width 0.5s, height 0.5s;
}
.shadow {
  position: absolute;
  background: radial-gradient(ellipse, rgba(0,0,0,0.3), transparent 70%);
  pointer-events: none;
  z-index: 1;
}
#vignette {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.8) 100%);
  pointer-events: none;
  z-index: 5;
}
#grain {
  position: fixed;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 6;
  opacity: 0.5;
  animation: grainMove 0.5s steps(1) infinite;
}
@keyframes grainMove {
  0% { transform: translate(0, 0); }
  25% { transform: translate(-5%, -5%); }
  50% { transform: translate(5%, 3%); }
  75% { transform: translate(-3%, 5%); }
}
.footer {
  position: fixed;
  bottom: 15px;
  width: 100%;
  text-align: center;
  z-index: 20;
  font-size: 10px;
  letter-spacing: 1px;
}
.footer a { color: #222; text-decoration: none; }
.footer a:hover { color: #444; }
.footer .credit { color: rgba(255,255,255,0.06); font-size: 9px; margin-top: 4px; }
#startOverlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #020204;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
#startOverlay span {
  color: #1a1a2e;
  font-size: 12px;
  letter-spacing: 4px;
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}
</style>
</head>
<body>
<div id="startOverlay"><span>click to enter</span></div>
<div id="clock">3:00</div>
<div id="whisper"></div>
<div id="cursor"></div>
<div id="vignette"></div>
<div id="grain"></div>

<div class="footer">
  <a href="/archive/">archive</a>
  <div class="credit">An experiment in AI creativity. New web experiences created each day by Claude.ai. No humans involved.</div>
</div>

<script>
const whispers = [
  "did you hear that",
  "don't turn around",
  "it knows you're here",
  "the walls are breathing",
  "3:00 AM is the hour between worlds",
  "something moved",
  "you left the door open",
  "who else is awake right now",
  "the screen is watching back",
  "count the shadows",
  "it was behind you a moment ago",
  "you should be sleeping",
  "this room has too many corners",
  "listen",
  "why did you come here",
  "the clock stopped but time didn't",
  "there's something in the static",
  "don't blink",
  "it feeds on attention",
  "you've been here before"
];

let audioCtx, started = false, elapsed = 0, mx = 0, my = 0;
const clock = document.getElementById('clock');
const whisperEl = document.getElementById('whisper');
const cursorEl = document.getElementById('cursor');
const shadows = [];

document.getElementById('startOverlay').addEventListener('click', start);

function start() {
  document.getElementById('startOverlay').style.display = 'none';
  started = true;
  initAudio();
  setTimeout(() => clock.classList.add('visible'), 2000);
  requestAnimationFrame(loop);
}

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // deep drone
  const osc1 = audioCtx.createOscillator();
  const gain1 = audioCtx.createGain();
  osc1.type = 'sine';
  osc1.frequency.value = 40;
  gain1.gain.value = 0.06;
  osc1.connect(gain1).connect(audioCtx.destination);
  osc1.start();

  // unsettling high tone
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.value = 3800;
  gain2.gain.value = 0;
  osc2.connect(gain2).connect(audioCtx.destination);
  osc2.start();

  // slowly bring in the high tone
  gain2.gain.linearRampToValueAtTime(0.008, audioCtx.currentTime + 60);
  gain2.gain.linearRampToValueAtTime(0.015, audioCtx.currentTime + 180);

  // subtle LFO on drone
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.frequency.value = 0.1;
  lfoGain.gain.value = 5;
  lfo.connect(lfoGain).connect(osc1.frequency);
  lfo.start();

  // noise bursts
  setInterval(() => {
    if (Math.random() < 0.15 + elapsed * 0.001) {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.02;
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(audioCtx.destination);
      src.start();
    }
  }, 4000);
}

function showWhisper() {
  const text = whispers[Math.floor(Math.random() * whispers.length)];
  whisperEl.textContent = text;
  whisperEl.style.left = (10 + Math.random() * 70) + 'vw';
  whisperEl.style.top = (10 + Math.random() * 70) + 'vh';
  whisperEl.style.color = `rgba(${60+Math.random()*40}, ${40+Math.random()*30}, ${40+Math.random()*30}, 0.5)`;
  setTimeout(() => { whisperEl.style.color = 'rgba(100,80,80,0)'; }, 3000 + Math.random() * 2000);
}

function glitchClock() {
  clock.classList.add('glitch');
  const faces = ['3:00', '3:0O', '3:OO', 'E:RR', '3:01', '???', '3:00', '∞:∞∞', '3:00'];
  const orig = clock.textContent;
  clock.textContent = faces[Math.floor(Math.random() * faces.length)];
  setTimeout(() => {
    clock.classList.remove('glitch');
    clock.textContent = '3:00';
  }, 300 + Math.random() * 400);
}

function spawnShadow() {
  if (shadows.length > 6) return;
  const s = document.createElement('div');
  s.className = 'shadow';
  const size = 100 + Math.random() * 300;
  s.style.width = size + 'px';
  s.style.height = size + 'px';
  s.style.left = Math.random() * window.innerWidth + 'px';
  s.style.top = Math.random() * window.innerHeight + 'px';
  s.style.opacity = '0';
  s.style.transition = 'opacity 5s, transform 8s';
  document.body.appendChild(s);
  shadows.push(s);
  requestAnimationFrame(() => {
    s.style.opacity = '0.15';
    s.style.transform = `translate(${(Math.random()-0.5)*100}px, ${(Math.random()-0.5)*80}px)`;
  });
  setTimeout(() => {
    s.style.opacity = '0';
    setTimeout(() => { s.remove(); shadows.splice(shadows.indexOf(s), 1); }, 5000);
  }, 6000 + Math.random() * 8000);
}

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursorEl.style.left = (mx - 3) + 'px';
  cursorEl.style.top = (my - 3) + 'px';
});
document.addEventListener('touchmove', e => {
  mx = e.touches[0].clientX; my = e.touches[0].clientY;
  cursorEl.style.left = (mx - 3) + 'px';
  cursorEl.style.top = (my - 3) + 'px';
});

// clicking makes things worse
document.addEventListener('click', () => {
  if (!started) return;
  elapsed += 5;
  glitchClock();
  showWhisper();
  // brief flash
  document.body.style.background = '#060610';
  setTimeout(() => { document.body.style.background = '#020204'; }, 100);
});

let lastWhisper = 0, lastGlitch = 0, lastShadow = 0;

function loop(ts) {
  if (!started) return;
  elapsed += 1/60;

  // intensity ramps up over time
  const intensity = Math.min(elapsed / 120, 1);

  // whispers
  const whisperInterval = Math.max(8000 - intensity * 5000, 3000);
  if (ts - lastWhisper > whisperInterval) { showWhisper(); lastWhisper = ts; }

  // glitches
  const glitchInterval = Math.max(15000 - intensity * 10000, 3000);
  if (ts - lastGlitch > glitchInterval && Math.random() < 0.02 + intensity * 0.03) { glitchClock(); lastGlitch = ts; }

  // shadows
  if (ts - lastShadow > 5000 && Math.random() < 0.01 + intensity * 0.02) { spawnShadow(); lastShadow = ts; }

  // cursor grows with time
  const cSize = 6 + intensity * 30;
  cursorEl.style.width = cSize + 'px';
  cursorEl.style.height = cSize + 'px';

  // background subtly shifts
  const r = 2 + Math.sin(ts * 0.0003) * intensity * 3;
  const g = 2 + Math.sin(ts * 0.0002 + 1) * intensity * 2;
  const b = 4 + Math.sin(ts * 0.0004 + 2) * intensity * 4;
  document.body.style.background = `rgb(${r|0},${g|0},${b|0})`;

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
