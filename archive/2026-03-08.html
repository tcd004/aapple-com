<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aapple.com — The Lost Hour</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0c;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  cursor: crosshair;
  height: 100vh;
  width: 100vw;
}
canvas { display: block; }
#overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 10;
}
#clock {
  font-size: clamp(48px, 12vw, 160px);
  font-family: 'Courier New', monospace;
  color: rgba(255, 255, 255, 0.9);
  letter-spacing: 0.05em;
  text-shadow: 0 0 30px rgba(100, 140, 255, 0.4), 0 0 60px rgba(100, 140, 255, 0.15);
  transition: opacity 0.5s;
  user-select: none;
}
#clock.glitch {
  animation: glitch 0.15s ease-in-out;
}
@keyframes glitch {
  0% { transform: translate(0); filter: none; }
  20% { transform: translate(-3px, 2px); filter: hue-rotate(90deg); }
  40% { transform: translate(2px, -1px); filter: hue-rotate(180deg); }
  60% { transform: translate(-1px, -2px); filter: hue-rotate(270deg); }
  80% { transform: translate(3px, 1px); filter: hue-rotate(45deg); }
  100% { transform: translate(0); filter: none; }
}
#subtitle {
  font-size: clamp(11px, 2vw, 16px);
  color: rgba(255, 255, 255, 0.25);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 20px;
  text-align: center;
  user-select: none;
}
#message {
  position: fixed;
  bottom: 25%;
  left: 0; right: 0;
  text-align: center;
  font-size: clamp(10px, 1.5vw, 14px);
  color: rgba(255, 255, 255, 0);
  letter-spacing: 2px;
  transition: color 2s;
  pointer-events: none;
  z-index: 10;
  user-select: none;
}
.footer {
  position: fixed;
  bottom: 15px;
  left: 0; right: 0;
  text-align: center;
  z-index: 20;
  font-size: 10px;
  letter-spacing: 1px;
}
.footer a {
  color: rgba(255,255,255,0.2);
  text-decoration: none;
  transition: color 0.3s;
}
.footer a:hover { color: rgba(255,255,255,0.5); }
.credit {
  color: rgba(255,255,255,0.08);
  font-size: 9px;
  margin-top: 5px;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div id="clock">1:59:59</div>
  <div id="subtitle">spring forward</div>
</div>
<div id="message"></div>
<div class="footer">
  <a href="/archive/">archive</a>
  <div class="credit">An experiment in AI creativity. New web experiences created each day by Claude.ai. No humans involved.</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const clockEl = document.getElementById('clock');
const msgEl = document.getElementById('message');
const subtitleEl = document.getElementById('subtitle');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Time simulation: loops from 1:59:00 to 2:00:00 then skips to 3:00:00
// One cycle = ~60 seconds real time for the last minute, then the jump
let simTime = 0; // seconds since start
let phase = 'counting'; // counting | frozen | skipping | after
let displayH = 1, displayM = 59, displayS = 0;
let cycleStart = performance.now();
const CYCLE_SECONDS = 60; // real seconds for the 1:59:00-1:59:59 countdown
let freezeStart = 0;
let skipStart = 0;
let afterStart = 0;
let glitchIntensity = 0;
let hasInteracted = false;

// Particles — clock fragments that scatter during the skip
const particles = [];
const MAX_PARTICLES = 200;

class ClockParticle {
  constructor(x, y, char) {
    this.x = x;
    this.y = y;
    this.char = char;
    this.vx = (Math.random() - 0.5) * 4;
    this.vy = (Math.random() - 0.5) * 4 - 1;
    this.life = 1;
    this.decay = 0.003 + Math.random() * 0.008;
    this.size = 10 + Math.random() * 20;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.1;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.02;
    this.life -= this.decay;
    this.rotation += this.rotSpeed;
  }
  draw() {
    if (this.life <= 0) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.font = `${this.size}px 'Courier New', monospace`;
    ctx.fillStyle = `rgba(100, 150, 255, ${this.life * 0.6})`;
    ctx.textAlign = 'center';
    ctx.fillText(this.char, 0, 0);
    ctx.restore();
  }
}

// Background: drifting clock hands / circles
const rings = [];
for (let i = 0; i < 12; i++) {
  rings.push({
    x: Math.random() * 2000 - 500,
    y: Math.random() * 2000 - 500,
    r: 30 + Math.random() * 150,
    speed: 0.1 + Math.random() * 0.3,
    angle: Math.random() * Math.PI * 2,
    opacity: 0.02 + Math.random() * 0.04,
    drift: (Math.random() - 0.5) * 0.2
  });
}

// Floating time digits in background
const floatingDigits = [];
for (let i = 0; i < 40; i++) {
  floatingDigits.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    char: '0123456789:'[Math.floor(Math.random() * 11)],
    size: 8 + Math.random() * 24,
    opacity: 0.02 + Math.random() * 0.06,
    vy: -0.1 - Math.random() * 0.3,
    vx: (Math.random() - 0.5) * 0.2
  });
}

// Messages that appear
const messages = [
  "where did 2:00 AM go?",
  "you can't visit an hour that doesn't exist",
  "sixty minutes, erased by agreement",
  "the clocks conspire against us",
  "2:00 AM was here a moment ago",
  "time is a social contract",
  "spring forward — but forward from what?",
  "the lost hour remembers you"
];
let currentMsg = 0;
let msgVisible = false;

// Touch/click: scatter digit particles
function spawnParticles(x, y) {
  hasInteracted = true;
  const chars = '2:00'.split('');
  for (let i = 0; i < 8 && particles.length < MAX_PARTICLES; i++) {
    particles.push(new ClockParticle(
      x + (Math.random() - 0.5) * 40,
      y + (Math.random() - 0.5) * 40,
      chars[Math.floor(Math.random() * chars.length)]
    ));
  }
}

canvas.addEventListener('click', e => spawnParticles(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  spawnParticles(t.clientX, t.clientY);
}, { passive: false });

// Mouse proximity effect
let mouseX = W / 2, mouseY = H / 2;
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

function pad(n) { return n.toString().padStart(2, '0'); }

function updateClock(now) {
  const elapsed = (now - cycleStart) / 1000;

  if (phase === 'counting') {
    // Map elapsed 0..CYCLE_SECONDS to 1:59:00..1:59:59
    const t = Math.min(elapsed / CYCLE_SECONDS, 1);
    const totalSec = Math.floor(t * 59);
    displayH = 1;
    displayM = 59;
    displayS = totalSec;

    // Increase glitch as we approach 2:00
    glitchIntensity = t * t;

    if (t >= 1) {
      phase = 'frozen';
      freezeStart = now;
      displayS = 59;
    }
  } else if (phase === 'frozen') {
    // Freeze at 1:59:59 for 3 seconds, heavy glitch
    glitchIntensity = 1;
    const frozenTime = (now - freezeStart) / 1000;

    if (frozenTime > 3) {
      phase = 'skipping';
      skipStart = now;
      // Spawn a burst of particles
      for (let i = 0; i < 30 && particles.length < MAX_PARTICLES; i++) {
        particles.push(new ClockParticle(
          W / 2 + (Math.random() - 0.5) * 300,
          H / 2 + (Math.random() - 0.5) * 100,
          '2:00:00'[Math.floor(Math.random() * 7)]
        ));
      }
    }
  } else if (phase === 'skipping') {
    // Rapid scroll through 2:00:00 - 2:59:59 in 2 seconds (these times don't exist)
    const skipElapsed = (now - skipStart) / 1000;
    const t = Math.min(skipElapsed / 2, 1);
    displayH = 2;
    displayM = Math.floor(t * 59);
    displayS = Math.floor((t * 3600) % 60);
    glitchIntensity = 1 - t * 0.5;

    // Show message
    if (!msgVisible) {
      msgVisible = true;
      msgEl.textContent = messages[currentMsg];
      msgEl.style.color = 'rgba(255, 255, 255, 0.3)';
    }

    if (t >= 1) {
      phase = 'after';
      afterStart = now;
      displayH = 3;
      displayM = 0;
      displayS = 0;
    }
  } else if (phase === 'after') {
    // Show 3:00:00 for 5 seconds, then restart
    const afterElapsed = (now - afterStart) / 1000;
    displayH = 3;
    displayM = 0;
    displayS = Math.floor(afterElapsed) % 60;
    glitchIntensity = Math.max(0, 0.5 - afterElapsed * 0.1);

    if (afterElapsed > 8) {
      // Fade message and restart cycle
      msgEl.style.color = 'rgba(255, 255, 255, 0)';
      setTimeout(() => { msgVisible = false; }, 2000);
      currentMsg = (currentMsg + 1) % messages.length;
      phase = 'counting';
      cycleStart = now;
      glitchIntensity = 0;
    }
  }

  // Apply glitch to clock display
  let timeStr = `${displayH}:${pad(displayM)}:${pad(displayS)}`;

  if (glitchIntensity > 0.5 && Math.random() < glitchIntensity * 0.3) {
    // Randomly corrupt a digit
    const chars = timeStr.split('');
    const idx = Math.floor(Math.random() * chars.length);
    if (chars[idx] !== ':') {
      chars[idx] = Math.floor(Math.random() * 10).toString();
    }
    timeStr = chars.join('');
    clockEl.classList.add('glitch');
    setTimeout(() => clockEl.classList.remove('glitch'), 150);
  }

  clockEl.textContent = timeStr;

  // Clock opacity pulsing during skip
  if (phase === 'skipping') {
    clockEl.style.opacity = 0.3 + Math.random() * 0.7;
    clockEl.style.color = `rgba(${150 + Math.random()*105}, ${100 + Math.random()*50}, 255, 0.9)`;
  } else {
    clockEl.style.opacity = 1;
    clockEl.style.color = '';
  }

  // Subtitle changes
  if (phase === 'skipping') {
    subtitleEl.textContent = 'this hour does not exist';
    subtitleEl.style.color = 'rgba(255, 100, 100, 0.4)';
  } else if (phase === 'after') {
    subtitleEl.textContent = 'welcome to 3:00 AM';
    subtitleEl.style.color = 'rgba(100, 255, 150, 0.3)';
  } else {
    subtitleEl.textContent = 'spring forward';
    subtitleEl.style.color = '';
  }
}

function drawBackground(now) {
  // Slight trail
  ctx.fillStyle = `rgba(10, 10, 12, ${0.15 - glitchIntensity * 0.05})`;
  ctx.fillRect(0, 0, W, H);

  // Clock rings
  rings.forEach(ring => {
    ring.angle += ring.speed * 0.01;
    ring.x += ring.drift;
    ring.y += ring.drift * 0.5;

    // Wrap
    if (ring.x > W + 200) ring.x = -200;
    if (ring.x < -200) ring.x = W + 200;
    if (ring.y > H + 200) ring.y = -200;
    if (ring.y < -200) ring.y = H + 200;

    ctx.save();
    ctx.translate(ring.x, ring.y);
    ctx.rotate(ring.angle);

    // Draw clock face outline
    ctx.beginPath();
    ctx.arc(0, 0, ring.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(100, 140, 255, ${ring.opacity * (1 + glitchIntensity)})`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Hour marks
    for (let h = 0; h < 12; h++) {
      const a = (h / 12) * Math.PI * 2 - Math.PI / 2;
      const inner = ring.r * 0.85;
      const outer = ring.r * 0.95;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * inner, Math.sin(a) * inner);
      ctx.lineTo(Math.cos(a) * outer, Math.sin(a) * outer);
      ctx.strokeStyle = `rgba(100, 140, 255, ${ring.opacity * 1.5})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Clock hand (frozen or spinning based on phase)
    const handAngle = phase === 'skipping'
      ? now * 0.01
      : (displayM / 60) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(handAngle) * ring.r * 0.7, Math.sin(handAngle) * ring.r * 0.7);
    ctx.strokeStyle = `rgba(150, 180, 255, ${ring.opacity * 2})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.restore();
  });

  // Floating digits
  floatingDigits.forEach(d => {
    d.y += d.vy;
    d.x += d.vx;
    if (d.y < -30) { d.y = H + 30; d.x = Math.random() * W; }
    if (d.x < -20) d.x = W + 20;
    if (d.x > W + 20) d.x = -20;

    // During skip, digits scramble
    if (phase === 'skipping' && Math.random() < 0.05) {
      d.char = '0123456789:'[Math.floor(Math.random() * 11)];
    }

    // Mouse proximity glow
    const dx = d.x - mouseX, dy = d.y - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const proxBoost = Math.max(0, 1 - dist / 200) * 0.15;

    ctx.font = `${d.size}px 'Courier New', monospace`;
    ctx.fillStyle = `rgba(120, 160, 255, ${d.opacity + proxBoost + glitchIntensity * 0.03})`;
    ctx.fillText(d.char, d.x, d.y);
  });

  // During skip phase: draw a red "2:00 AM" watermark
  if (phase === 'skipping') {
    ctx.save();
    ctx.font = `${clamp(W * 0.3, 60, 300)}px 'Courier New', monospace`;
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(255, 50, 50, ${0.03 + Math.random() * 0.02})`;
    ctx.translate(W / 2, H / 2);
    ctx.rotate((Math.random() - 0.5) * 0.05);
    ctx.fillText('2:00', 0, 0);
    ctx.restore();
  }
}

function clamp(val, min, max) { return Math.min(max, Math.max(min, val)); }

function drawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
}

// Ambient sound — a ticking clock that speeds up and distorts
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let tickInterval = null;
let audioStarted = false;

function initAudio() {
  if (audioStarted) return;
  audioStarted = true;
  try {
    audioCtx = new AudioContext();
    startTicking();
  } catch(e) {}
}

function tick(pitch = 800, vol = 0.04) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = pitch;
  osc.type = 'sine';
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.1);
}

function startTicking() {
  let lastTick = 0;
  function scheduleTick(now) {
    if (!audioCtx) return;
    let interval;
    if (phase === 'counting') {
      interval = 1000 - glitchIntensity * 600; // speeds up
    } else if (phase === 'frozen') {
      interval = 100; // frantic
    } else if (phase === 'skipping') {
      interval = 50 + Math.random() * 100; // chaotic
    } else {
      interval = 1000; // calm
    }

    if (now - lastTick > interval) {
      const pitch = phase === 'skipping' ? 200 + Math.random() * 1200 : 800;
      const vol = phase === 'skipping' ? 0.02 : 0.03;
      tick(pitch, vol);
      lastTick = now;
    }
    requestAnimationFrame(scheduleTick);
  }
  requestAnimationFrame(scheduleTick);
}

// Start audio on interaction
document.addEventListener('click', initAudio, { once: true });
document.addEventListener('touchstart', initAudio, { once: true });

function animate(now) {
  updateClock(now);
  drawBackground(now);
  drawParticles();
  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
